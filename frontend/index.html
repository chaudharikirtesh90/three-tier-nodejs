<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Tasks | Premium Manager</title>
    <meta name="description" content="A beautiful, premium task manager built with a 3-tier Node.js architecture.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="app-container">
        <header>
            <h1>Nexus Tasks</h1>
            <p>Elevate your productivity</p>
        </header>

        <section class="input-section">
            <form id="task-form">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit" id="add-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </form>
        </section>

        <section class="tasks-section">
            <div class="tasks-header">
                <h2>Your Tasks</h2>
                <span id="task-count">0 tasks</span>
            </div>
            <ul id="task-list">
                <!-- Tasks will be injected here by app.js -->
                <li class="empty-state">Loading tasks...</li>
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
